<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trikot Shop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }

    header {
      background: #111;
      color: #fff;
      padding: 20px 24px;
      text-align: center;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 1px; }
    header p { font-size: 0.85rem; color: #aaa; margin-top: 4px; }
    .stats { font-size: 0.85rem; color: #aaa; margin-top: 10px; }
    .stats span { color: #fff; font-weight: 700; font-size: 1rem; }

    .admin-bar {
      display: none;
      background: #f59e0b;
      color: #000;
      text-align: center;
      padding: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    body.admin-mode .admin-bar { display: block; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      transition: opacity 0.2s;
    }
    .card.sold-out { opacity: 0.55; }

    .gallery {
      position: relative;
      background: #eee;
      aspect-ratio: 3/4;
      overflow: hidden;
    }
    .gallery img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .gallery img.active { opacity: 1; }

    .sold-badge {
      display: none;
      position: absolute;
      top: 12px;
      left: 12px;
      background: #ef4444;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      z-index: 2;
    }
    .card.sold-out .sold-badge { display: block; }

    .thumbs {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      background: #f9f9f9;
      border-bottom: 1px solid #eee;
    }
    .thumbs button {
      flex: 1;
      aspect-ratio: 1;
      border: 2px solid transparent;
      border-radius: 5px;
      overflow: hidden;
      padding: 0;
      cursor: pointer;
      background: none;
    }
    .thumbs button.active { border-color: #111; }
    .thumbs button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .info {
      padding: 14px 16px 16px;
    }
    .info h2 { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
    .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .size-badge {
      background: #f0f0f0;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      color: #444;
    }
    .price {
      font-size: 1.1rem;
      font-weight: 700;
      color: #111;
      margin-left: auto;
    }

    .wa-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 12px;
      padding: 11px;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .wa-btn:hover { background: #1ebe5c; }
    .wa-btn svg { flex-shrink: 0; }
    .card.sold-out .wa-btn { display: none; }

    .stock-toggle {
      display: none;
      width: 100%;
      margin-top: 10px;
      padding: 9px;
      border: none;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    body.admin-mode .stock-toggle { display: block; }
    .stock-toggle.is-available {
      background: #fee2e2;
      color: #b91c1c;
    }
    .stock-toggle.is-sold {
      background: #dcfce7;
      color: #166534;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>

<div class="admin-bar">⚙️ Admin-Modus — Klicke auf einen Button um den Lagerstand zu ändern</div>

<header>
  <h1>Trikot Shop</h1>
  <p>Replica Trikots · 19 € pro Stück</p>
  <p class="stats" id="stats"></p>
</header>

<div class="grid" id="grid"></div>

<footer>Bei Interesse einfach per WhatsApp melden.</footer>

<script>
  const WHATSAPP = "4917661678782";
  const IS_ADMIN = new URLSearchParams(location.search).has("admin");

  if (IS_ADMIN) document.body.classList.add("admin-mode");

  const jerseys = [
    {
      id: "spain-yamal-xxl",
      name: "España #10 Lamine Yamal",
      size: "XXL",
      images: ["images/IMG_0290.jpeg","images/IMG_0293.jpeg","images/IMG_0295.jpeg"]
    },
    {
      id: "turkey-arda-away-s",
      name: "Türkiye #10 Arda Güler (Away)",
      size: "S",
      images: ["images/IMG_0296.jpeg","images/IMG_0298.jpeg","images/IMG_0299.jpeg"]
    },
    {
      id: "ronaldo-multiclub-l",
      name: "Ronaldo Multi-Club Edition",
      size: "L",
      images: ["images/IMG_0304.jpeg","images/IMG_0303.jpeg","images/IMG_0305.jpeg"]
    },
    {
      id: "liverpool-wirtz-l",
      name: "Liverpool #7 Wirtz",
      size: "L",
      images: ["images/IMG_0306.jpeg","images/IMG_0309.jpeg","images/IMG_0308.jpeg"]
    },
    {
      id: "turkey-arda-home-l",
      name: "Türkiye #8 Arda Güler (Home)",
      size: "L",
      images: ["images/IMG_0314.jpeg","images/IMG_0316.jpeg","images/IMG_0315.jpeg"]
    },
    {
      id: "bayern-kane-l",
      name: "FC Bayern München #9 Kane",
      size: "L",
      images: ["images/IMG_0318.jpeg","images/IMG_0322.jpeg","images/IMG_0321.jpeg"]
    },
    {
      id: "turkey-arda-away-l",
      name: "Türkiye #10 Arda Güler (Away)",
      size: "L",
      images: ["images/IMG_0323.jpeg","images/IMG_0324.jpeg","images/IMG_0325.jpeg"]
    },
    {
      id: "milan-kaka-xl",
      name: "AC Milan #22 Kaká (UCL)",
      size: "XL",
      images: ["images/IMG_0327.jpeg","images/IMG_0331.jpeg"]
    }
  ];

  function isSold(id) {
    return localStorage.getItem("sold_" + id) === "1";
  }

  function updateStats() {
    const total = jerseys.length;
    const active = jerseys.filter(j => !isSold(j.id)).length;
    document.getElementById("stats").innerHTML =
      `<span>${active}</span> / ${total} verfügbar`;
  }

  function toggleStock(id, cardEl, btnEl) {
    const sold = !isSold(id);
    localStorage.setItem("sold_" + id, sold ? "1" : "0");
    applyStock(cardEl, btnEl, sold);
    updateStats();
  }

  function applyStock(cardEl, btnEl, sold) {
    cardEl.classList.toggle("sold-out", sold);
    if (btnEl) {
      btnEl.textContent = sold ? "✓ Wieder verfügbar machen" : "✗ Als verkauft markieren";
      btnEl.className = "stock-toggle " + (sold ? "is-sold" : "is-available");
    }
  }

  const grid = document.getElementById("grid");
  updateStats();

  jerseys.forEach((jersey, idx) => {
    const sold = isSold(jersey.id);
    const card = document.createElement("div");
    card.className = "card" + (sold ? " sold-out" : "");

    const msg = encodeURIComponent(`Hallo! Ich interessiere mich für das Trikot: ${jersey.name} (Größe ${jersey.size}) für 19 €. Ist es noch verfügbar?`);
    const waLink = `https://wa.me/${WHATSAPP}?text=${msg}`;

    const imgTags = jersey.images.map((src, i) =>
      `<img src="${src}" class="${i === 0 ? "active" : ""}" loading="lazy" alt="${jersey.name}">`
    ).join("");

    const thumbTags = jersey.images.map((src, i) =>
      `<button class="${i === 0 ? "active" : ""}" onclick="setPhoto(this,${idx},${i})">
        <img src="${src}" loading="lazy" alt="">
      </button>`
    ).join("");

    const toggleLabel = sold ? "✓ Wieder verfügbar machen" : "✗ Als verkauft markieren";
    const toggleClass = sold ? "is-sold" : "is-available";

    card.innerHTML = `
      <div class="gallery" id="gallery-${idx}">
        ${imgTags}
        <span class="sold-badge">VERKAUFT</span>
      </div>
      <div class="thumbs">${thumbTags}</div>
      <div class="info">
        <h2>${jersey.name}</h2>
        <div class="meta">
          <span class="size-badge">Größe ${jersey.size}</span>
          <span class="price">19 €</span>
        </div>
        <a class="wa-btn" href="${waLink}" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 32 32" fill="currentColor">
            <path d="M16 0C7.163 0 0 7.163 0 16c0 2.83.74 5.485 2.032 7.793L0 32l8.456-2.007A15.94 15.94 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm0 29.333a13.27 13.27 0 01-6.77-1.848l-.484-.288-5.02 1.192 1.213-4.886-.315-.502A13.253 13.253 0 012.667 16C2.667 8.636 8.636 2.667 16 2.667S29.333 8.636 29.333 16 23.364 29.333 16 29.333zm7.27-9.942c-.398-.2-2.354-1.161-2.718-1.294-.365-.133-.63-.2-.896.2-.265.398-1.028 1.294-1.26 1.56-.232.265-.465.298-.863.1-.398-.2-1.681-.62-3.2-1.975-1.183-1.055-1.981-2.357-2.213-2.755-.232-.398-.025-.613.174-.812.179-.178.398-.465.597-.697.2-.232.265-.398.398-.663.133-.265.066-.497-.033-.697-.1-.2-.896-2.16-1.228-2.956-.323-.775-.652-.67-.896-.682-.232-.012-.497-.015-.763-.015s-.697.1-.1063.497c-.365.398-1.394 1.362-1.394 3.32s1.427 3.851 1.627 4.116c.2.265 2.81 4.286 6.808 6.013.952.41 1.694.656 2.274.84.954.303 1.824.26 2.51.158.766-.113 2.354-.963 2.686-1.892.333-.93.333-1.726.232-1.892-.099-.166-.365-.265-.763-.464z"/>
          </svg>
          Per WhatsApp anfragen
        </a>
        <button class="stock-toggle ${toggleClass}" onclick="toggleStock('${jersey.id}', this.closest('.card'), this)">
          ${toggleLabel}
        </button>
      </div>
    `;

    grid.appendChild(card);
  });

  function setPhoto(btn, cardIdx, photoIdx) {
    const gallery = document.getElementById(`gallery-${cardIdx}`);
    gallery.querySelectorAll("img").forEach((img, i) => {
      img.classList.toggle("active", i === photoIdx);
    });
    btn.closest(".card").querySelectorAll(".thumbs button").forEach((b, i) => {
      b.classList.toggle("active", i === photoIdx);
    });
  }
</script>

</body>
</html>
