<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trikot Shop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }

    header {
      background: #111;
      color: #fff;
      padding: 20px 24px;
      text-align: center;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 1px; }
    header p { font-size: 0.85rem; color: #aaa; margin-top: 4px; }
    .stats { font-size: 0.85rem; color: #aaa; margin-top: 10px; }
    .stats span { color: #fff; font-weight: 700; font-size: 1rem; }

    .admin-bar {
      display: none;
      background: #f59e0b;
      color: #000;
      text-align: center;
      padding: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    body.admin-mode .admin-bar { display: block; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      transition: opacity 0.2s;
    }
    .card.sold-out { opacity: 0.55; }

    .gallery {
      position: relative;
      background: #eee;
      aspect-ratio: 3/4;
      overflow: hidden;
    }
    .gallery img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .gallery img.active { opacity: 1; }

    .sold-badge {
      display: none;
      position: absolute;
      top: 12px;
      left: 12px;
      background: #ef4444;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      z-index: 2;
    }
    .card.sold-out .sold-badge { display: block; }

    .thumbs {
      display: flex;
      gap: 6px;
      padding: 8px 10px;
      background: #f9f9f9;
      border-bottom: 1px solid #eee;
    }
    .thumbs button {
      flex: 1;
      aspect-ratio: 1;
      border: 2px solid transparent;
      border-radius: 5px;
      overflow: hidden;
      padding: 0;
      cursor: pointer;
      background: none;
    }
    .thumbs button.active { border-color: #111; }
    .thumbs button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .info {
      padding: 14px 16px 16px;
    }
    .info h2 { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
    .meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .size-badge {
      background: #f0f0f0;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      color: #444;
    }
    .price {
      font-size: 1.1rem;
      font-weight: 700;
      color: #111;
      margin-left: auto;
    }

    .wa-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 12px;
      padding: 11px;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .wa-btn:hover { background: #1ebe5c; }
    .wa-btn svg { flex-shrink: 0; }
    .card.sold-out .wa-btn { display: none; }

    .stock-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.62);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 2;
    }
    .card.sold-out .stock-badge { display: none; }

    .stock-controls {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      background: #f5f5f5;
      border-radius: 7px;
      padding: 6px 10px;
    }
    body.admin-mode .stock-controls { display: flex; }
    .stock-controls button {
      width: 30px;
      height: 30px;
      border: 1px solid #ddd;
      border-radius: 5px;
      background: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      line-height: 1;
    }
    .stock-count-display {
      flex: 1;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.8rem;
      color: #999;
    }

    .cart-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 8px;
      padding: 11px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .cart-btn:hover { background: #333; }
    .cart-btn.in-cart { background: #d1fae5; color: #065f46; }
    .cart-btn.in-cart:hover { background: #a7f3d0; }
    .card.sold-out .cart-btn { display: none; }

    .cart-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111;
      color: #fff;
      padding: 14px 20px;
      z-index: 100;
      align-items: center;
      gap: 10px;
      box-shadow: 0 -3px 16px rgba(0,0,0,0.25);
    }
    .cart-bar.visible { display: flex; }
    .cart-bar-label { flex: 1; font-size: 0.9rem; font-weight: 600; }
    .cart-bar-label .highlight { color: #f59e0b; }
    .cart-send-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #25d366;
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .cart-send-btn:hover { background: #1ebe5c; }
    .cart-clear-btn {
      background: #2a2a2a;
      color: #aaa;
      border: none;
      padding: 10px 12px;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .cart-clear-btn:hover { background: #444; color: #fff; }

    body.has-cart { padding-bottom: 70px; }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 16px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .filter-btn {
      padding: 7px 16px;
      border: 2px solid #ddd;
      border-radius: 99px;
      background: #fff;
      color: #444;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: #111; color: #111; }
    .filter-btn.active { background: #111; color: #fff; border-color: #111; }

    .lang-switcher {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 12px;
    }
    .lang-btn {
      padding: 4px 10px;
      border: 1px solid #555;
      border-radius: 4px;
      background: transparent;
      color: #aaa;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .lang-btn.active { background: #fff; color: #111; border-color: #fff; }

    /* Vitrin */
    .vitrin {
      display: block;
      position: relative;
      width: 100%;
      height: 460px;
      overflow: hidden;
      background: #111;
      isolation: isolate;
    }
    @media (max-width: 560px) { .vitrin { height: 320px; } }
    .vitrin-slide {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      z-index: 0;
      transition: opacity 0.7s ease;
      pointer-events: none;
    }
    .vitrin-slide.active { opacity: 1; z-index: 1; pointer-events: auto; }
    .vitrin-img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }
    .vitrin-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.35) 45%, transparent 70%),
        linear-gradient(to right, rgba(0,0,0,0.5) 0%, transparent 55%);
    }
    .vitrin-info {
      position: absolute;
      bottom: 52px;
      left: 24px;
      right: 24px;
      color: #fff;
    }
    @media (min-width: 560px) {
      .vitrin-info { left: 40px; right: auto; max-width: 380px; }
    }
    .vitrin-info h2 {
      font-size: 1.45rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 4px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }
    .vitrin-info p { font-size: 0.85rem; color: #ddd; margin-top: 3px; }
    .vitrin-price { font-size: 1.5rem; font-weight: 800; margin: 10px 0 14px; }
    .vitrin-wa {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: #25d366;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
    }
    .vitrin-wa:hover { background: #1ebe5c; }
    .vitrin-dots {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 2;
    }
    .vitrin-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: background 0.2s, transform 0.2s;
    }
    .vitrin-dot.active { background: #fff; transform: scale(1.35); }
    .vitrin-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.35);
      color: #fff;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: background 0.15s;
      line-height: 1;
    }
    .vitrin-arrow:hover { background: rgba(0,0,0,0.6); }
    .vitrin-arrow-left { left: 12px; }
    .vitrin-arrow-right { right: 12px; }
  </style>
</head>

  const FB_SOLD_URL = "https://replicatrikot-default-rtdb.europe-west1.firebasedatabase.app/sold.json";
  const FB_STOCK_URL = "https://replicatrikot-default-rtdb.europe-west1.firebasedatabase.app/stock.json";

  const STOCK_DEFAULTS = { "barca-yamal-home-l": 2 };
  function getInitialStock(id) { return STOCK_DEFAULTS[id] ?? 1; }

  let stockData = {};

  async function loadStock() {
    try {
      const res = await fetch(FB_STOCK_URL + "?t=" + Date.now());
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      if (data && Object.keys(data).length > 0) {
        stockData = data;
      } else {
        // İlk çalıştırma: eski sold.json'dan migrate et
        try {
          const soldRes = await fetch(FB_SOLD_URL + "?t=" + Date.now());
          const soldIds = soldRes.ok ? ((await soldRes.json()) || []) : [];
          jerseys.forEach(j => {
            stockData[j.id] = soldIds.includes(j.id) ? 0 : getInitialStock(j.id);
          });
        } catch {
          jerseys.forEach(j => { stockData[j.id] = getInitialStock(j.id); });
        }
        await saveStock();
      }
    } catch {
      const local = JSON.parse(localStorage.getItem("stockData") || "{}");
      jerseys.forEach(j => {
        stockData[j.id] = j.id in local ? local[j.id] : getInitialStock(j.id);
      });
    }
    jerseys.forEach(j => { if (!(j.id in stockData)) stockData[j.id] = getInitialStock(j.id); });
  }

  async function saveStock() {
    localStorage.setItem("stockData", JSON.stringify(stockData));
    try {
      await fetch(FB_STOCK_URL, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(stockData)
      });
    } catch {}
  }

  function getStock(id) { return stockData[id] ?? getInitialStock(id); }
  function isSoldOut(id) { return getStock(id) <= 0; }

  function updateStats() {
    const total = jerseys.length;
    const active = jerseys.filter(j => !isSoldOut(j.id)).length;
    document.getElementById("stats").innerHTML =
      `<span>${active}</span> / ${total} ${T[currentLang].statsAvail}`;
  }

  function adjustStock(id, delta) {
    const newStock = Math.max(0, getStock(id) + delta);
    stockData[id] = newStock;
    const t = T[currentLang];
    const card = document.querySelector(`.card[data-jersey-id="${id}"]`);
    if (card) {
      card.classList.toggle("sold-out", newStock === 0);
      const badge = document.getElementById(`stock-badge-${id}`);
      if (badge) badge.textContent = t.stock(newStock);
      const display = document.getElementById(`stock-display-${id}`);
      if (display) display.textContent = t.stock(newStock);
    }
    updateStats();
    saveStock();
  }

  const grid = document.getElementById("grid");

  let vitrinIdx = 0;
  let vitrinTimer = null;
  const WA_SVG = `<svg width="18" height="18" viewBox="0 0 32 32" fill="currentColor"><path d="M16 0C7.163 0 0 7.163 0 16c0 2.83.74 5.485 2.032 7.793L0 32l8.456-2.007A15.94 15.94 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm0 29.333a13.27 13.27 0 01-6.77-1.848l-.484-.288-5.02 1.192 1.213-4.886-.315-.502A13.253 13.253 0 012.667 16C2.667 8.636 8.636 2.667 16 2.667S29.333 8.636 29.333 16 23.364 29.333 16 29.333zm7.27-9.942c-.398-.2-2.354-1.161-2.718-1.294-.365-.133-.63-.2-.896.2-.265.398-1.028 1.294-1.26 1.56-.232.265-.465.298-.863.1-.398-.2-1.681-.62-3.2-1.975-1.183-1.055-1.981-2.357-2.213-2.755-.232-.398-.025-.613.174-.812.179-.178.398-.465.597-.697.2-.232.265-.398.398-.663.133-.265.066-.497-.033-.697-.1-.2-.896-2.16-1.228-2.956-.323-.775-.652-.67-.896-.682-.232-.012-.497-.015-.763-.015s-.697.1-1.063.497c-.365.398-1.394 1.362-1.394 3.32s1.427 3.851 1.627 4.116c.2.265 2.81 4.286 6.808 6.013.952.41 1.694.656 2.274.84.954.303 1.824.26 2.51.158.766-.113 2.354-.963 2.686-1.892.333-.93.333-1.726.232-1.892-.099-.166-.365-.265-.763-.464z"/></svg>`;

  function buildVitrin() {
    const featured = FEATURED_IDS.map(id => jerseys.find(j => j.id === id)).filter(Boolean);
    const container = document.getElementById("vitrin");
    if (!container || !featured.length) return;
    container.innerHTML = "";
    vitrinIdx = 0;
    const t = T[currentLang];

    featured.forEach((jersey, i) => {
      const slide = document.createElement("div");
      slide.className = "vitrin-slide" + (i === 0 ? " active" : "");
      slide.innerHTML = `
        <img class="vitrin-img" src="${jersey.images[0]}" loading="${i === 0 ? "eager" : "lazy"}" alt="${jersey.name}">
        <div class="vitrin-overlay"></div>
        <div class="vitrin-info">
          <h2>${jersey.name}</h2>
          ${jersey.detail ? `<p>${jersey.detail}</p>` : ""}
          <p class="vitrin-size" data-size="${jersey.size}">${t.size} ${jersey.size}</p>
          <div class="vitrin-price">19 €</div>
          <button class="vitrin-wa" onclick="openWA('${jersey.id}')">
            ${WA_SVG}<span class="vitrin-wa-text">${t.waBtn}</span>
          </button>
        </div>
      `;
      container.appendChild(slide);
    });

    const dotsEl = document.createElement("div");
    dotsEl.className = "vitrin-dots";
    featured.forEach((_, i) => {
      const dot = document.createElement("button");
      dot.className = "vitrin-dot" + (i === 0 ? " active" : "");
      dot.onclick = () => goVitrin(i);
      dotsEl.appendChild(dot);
    });
    container.appendChild(dotsEl);

    const arrowL = document.createElement("button");
    arrowL.className = "vitrin-arrow vitrin-arrow-left";
    arrowL.textContent = "‹";
    arrowL.onclick = () => goVitrin((vitrinIdx - 1 + featured.length) % featured.length);
    container.appendChild(arrowL);

    const arrowR = document.createElement("button");
    arrowR.className = "vitrin-arrow vitrin-arrow-right";
    arrowR.textContent = "›";
    arrowR.onclick = () => goVitrin((vitrinIdx + 1) % featured.length);
    container.appendChild(arrowR);

    startVitrinTimer(featured.length);
    container.addEventListener("mouseenter", () => clearInterval(vitrinTimer));
    container.addEventListener("mouseleave", () => startVitrinTimer(featured.length));
  }

  function goVitrin(idx) {
    const slides = document.querySelectorAll(".vitrin-slide");
    const dots = document.querySelectorAll(".vitrin-dot");
    if (!slides.length) return;
    slides[vitrinIdx].classList.remove("active");
    dots[vitrinIdx].classList.remove("active");
    vitrinIdx = idx;
    slides[vitrinIdx].classList.add("active");
    dots[vitrinIdx].classList.add("active");
  }

  function startVitrinTimer(count) {
    clearInterval(vitrinTimer);
    vitrinTimer = setInterval(() => goVitrin((vitrinIdx + 1) % count), 4500);
  }

  async function init() {
    await loadStock();
    applyLangToStatic();
    buildVitrin();
    updateStats();
    jerseys.forEach((jersey, idx) => {
      const t = T[currentLang];
      const stock = getStock(jersey.id);
      const soldOut = stock <= 0;
    const card = document.createElement("div");
    card.className = "card" + (soldOut ? " sold-out" : "");
    card.dataset.category = jersey.category;
    card.dataset.jerseyId = jersey.id;

    const imgTags = jersey.images.map((src, i) =>
      `<img src="${src}" class="${i === 0 ? "active" : ""}" loading="lazy" alt="${jersey.name}">`
    ).join("");

    const thumbTags = jersey.images.map((src, i) =>
      `<button class="${i === 0 ? "active" : ""}" onclick="setPhoto(this,${idx},${i})">
        <img src="${src}" loading="lazy" alt="">
      </button>`
    ).join("");

    card.innerHTML = `
      <div class="gallery" id="gallery-${idx}">
        ${imgTags}
        <span class="sold-badge">${t.soldBadge}</span>
        <span class="stock-badge" id="stock-badge-${jersey.id}">${t.stock(stock)}</span>
      </div>
      <div class="thumbs">${thumbTags}</div>
      <div class="info">
        <h2>${jersey.name}</h2>
        ${jersey.detail ? `<p style="font-size:0.78rem;color:#777;margin-top:3px">${jersey.detail}</p>` : ""}
        <div class="meta">
          <span class="size-badge" id="size-${jersey.id}">${t.size} ${jersey.size}</span>
          <span class="price">19 €</span>
        </div>
        <button class="wa-btn" onclick="openWA('${jersey.id}')">
          <svg width="18" height="18" viewBox="0 0 32 32" fill="currentColor">
            <path d="M16 0C7.163 0 0 7.163 0 16c0 2.83.74 5.485 2.032 7.793L0 32l8.456-2.007A15.94 15.94 0 0016 32c8.837 0 16-7.163 16-16S24.837 0 16 0zm0 29.333a13.27 13.27 0 01-6.77-1.848l-.484-.288-5.02 1.192 1.213-4.886-.315-.502A13.253 13.253 0 012.667 16C2.667 8.636 8.636 2.667 16 2.667S29.333 8.636 29.333 16 23.364 29.333 16 29.333zm7.27-9.942c-.398-.2-2.354-1.161-2.718-1.294-.365-.133-.63-.2-.896.2-.265.398-1.028 1.294-1.26 1.56-.232.265-.465.298-.863.1-.398-.2-1.681-.62-3.2-1.975-1.183-1.055-1.981-2.357-2.213-2.755-.232-.398-.025-.613.174-.812.179-.178.398-.465.597-.697.2-.232.265-.398.398-.663.133-.265.066-.497-.033-.697-.1-.2-.896-2.16-1.228-2.956-.323-.775-.652-.67-.896-.682-.232-.012-.497-.015-.763-.015s-.697.1-1.063.497c-.365.398-1.394 1.362-1.394 3.32s1.427 3.851 1.627 4.116c.2.265 2.81 4.286 6.808 6.013.952.41 1.694.656 2.274.84.954.303 1.824.26 2.51.158.766-.113 2.354-.963 2.686-1.892.333-.93.333-1.726.232-1.892-.099-.166-.365-.265-.763-.464z"/>
          </svg>
          <span class="wa-text">${t.waBtn}</span>
        </button>
        <button class="cart-btn" data-id="${jersey.id}" onclick="toggleCart('${jersey.id}', this)">
          ${t.cartAdd}
        </button>
        <div class="stock-controls">
          <button onclick="adjustStock('${jersey.id}', -1)">−</button>
          <span class="stock-count-display" id="stock-display-${jersey.id}">${t.stock(stock)}</span>
          <button onclick="adjustStock('${jersey.id}', +1)">+</button>
        </div>
      </div>
    `;

    grid.appendChild(card);
    });
  }

  init();

  let cart = [];

  function toggleCart(id, btn) {
    const t = T[currentLang];
    const jersey = jerseys.find(j => j.id === id);
    const idx = cart.findIndex(j => j.id === id);
    if (idx === -1) {
      cart.push(jersey);
      btn.textContent = t.cartIn;
      btn.classList.add("in-cart");
    } else {
      cart.splice(idx, 1);
      btn.textContent = t.cartAdd;
      btn.classList.remove("in-cart");
    }
    updateCartBar();
  }

  function updateCartBar() {
    const t = T[currentLang];
    const bar = document.getElementById("cart-bar");
    const label = document.getElementById("cart-bar-label");
    if (cart.length === 0) {
      bar.classList.remove("visible");
      document.body.classList.remove("has-cart");
      return;
    }
    bar.classList.add("visible");
    document.body.classList.add("has-cart");
    const total = cart.length * 19;
    label.innerHTML = t.cartLabel(cart.length, total);
  }

  function clearCart() {
    const t = T[currentLang];
    cart = [];
    document.querySelectorAll(".cart-btn").forEach(btn => {
      btn.textContent = t.cartAdd;
      btn.classList.remove("in-cart");
    });
    updateCartBar();
  }

  function sendCart() {
    if (cart.length === 0) return;
    const t = T[currentLang];
    const lines = cart.map((j, i) => t.waCartLine(i + 1, j.name, j.size)).join("\n");
    const total = cart.length * 19;
    const msg = encodeURIComponent(t.waCart(lines, cart.length, total));
    window.open(`https://wa.me/${WHATSAPP}?text=${msg}`, "_blank");
  }

  function openWA(id) {
    const jersey = jerseys.find(j => j.id === id);
    const t = T[currentLang];
    const msg = encodeURIComponent(t.waSingle(jersey.name, jersey.size));
    window.open(`https://wa.me/${WHATSAPP}?text=${msg}`, "_blank");
  }

  function applyLangToStatic() {
    const t = T[currentLang];
    document.getElementById("subtitle").textContent = t.subtitle;
    document.getElementById("admin-bar-text").textContent = t.adminBar;
    document.getElementById("footer-text").textContent = t.footer;
    document.getElementById("cart-clear-btn").textContent = t.cartClear;
    document.getElementById("cart-send-text").textContent = t.cartSend;
    document.querySelector("[data-filter='all']").textContent = t.filterAll;
    document.querySelector("[data-filter='national']").textContent = t.filterNational;
    document.querySelector("[data-filter='english']").textContent = t.filterEnglish;
    document.querySelector("[data-filter='deutsch']").textContent = t.filterDeutsch;
    document.querySelector("[data-filter='spanisch']").textContent = t.filterSpanisch;
    document.querySelector("[data-filter='italian']").textContent = t.filterItalian;
    document.querySelector("[data-filter='andere']").textContent = t.filterAndere;
    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.lang === currentLang);
    });
    document.querySelectorAll(".vitrin-wa-text").forEach(el => el.textContent = t.waBtn);
    document.querySelectorAll(".vitrin-size").forEach(el => {
      el.textContent = `${t.size} ${el.dataset.size}`;
    });
  }

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem(LANG_KEY, lang);
    const t = T[lang];
    applyLangToStatic();
    updateStats();
    updateCartBar();
    jerseys.forEach(jersey => {
      const stock = getStock(jersey.id);
      const inCart = cart.some(j => j.id === jersey.id);
      const sizeBadge = document.getElementById(`size-${jersey.id}`);
      if (sizeBadge) sizeBadge.textContent = `${t.size} ${jersey.size}`;
      const waText = document.querySelector(`.card[data-jersey-id="${jersey.id}"] .wa-text`);
      if (waText) waText.textContent = t.waBtn;
      const cartBtn = document.querySelector(`.card[data-jersey-id="${jersey.id}"] .cart-btn`);
      if (cartBtn) cartBtn.textContent = inCart ? t.cartIn : t.cartAdd;
      const soldBadge = document.querySelector(`.card[data-jersey-id="${jersey.id}"] .sold-badge`);
      if (soldBadge) soldBadge.textContent = t.soldBadge;
      const stockBadge = document.getElementById(`stock-badge-${jersey.id}`);
      if (stockBadge) stockBadge.textContent = t.stock(stock);
      const stockDisplay = document.getElementById(`stock-display-${jersey.id}`);
      if (stockDisplay) stockDisplay.textContent = t.stock(stock);
    });
  }

  let activeFilter = "all";

  function setFilter(cat, btn) {
    activeFilter = cat;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".card").forEach(card => {
      const match = cat === "all" || card.dataset.category === cat;
      card.style.display = match ? "" : "none";
    });
  }

  function setPhoto(btn, cardIdx, photoIdx) {
    const gallery = document.getElementById(`gallery-${cardIdx}`);
    gallery.querySelectorAll("img").forEach((img, i) => {
      img.classList.toggle("active", i === photoIdx);
    });
    btn.closest(".card").querySelectorAll(".thumbs button").forEach((b, i) => {
      b.classList.toggle("active", i === photoIdx);
    });
  }
</script>
